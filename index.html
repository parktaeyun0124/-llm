<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI + Ollama AI Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --chat-bg: rgba(30, 41, 59, 0.7);
            --user-msg: linear-gradient(135deg, #3b82f6, #2563eb);
            --ai-msg: rgba(51, 65, 85, 0.9);
            --text-color: #f8fafc;
            --accent: #3b82f6;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 1000px;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        select {
            background: rgba(15, 23, 42, 0.8);
            color: white;
            border: 1px solid var(--glass-border);
            padding: 10px 16px;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            transition: all 0.2s;
            appearance: none;
            min-width: 180px;
        }

        select:hover, select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .chat-container {
            flex: 1;
            width: 100%;
            max-width: 1000px;
            overflow-y: auto;
            padding: 24px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        /* Hide scrollbar for clean look */
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background-color: rgba(255,255,255,0.2); border-radius: 10px; }

        .message-row {
            display: flex;
            gap: 16px;
            max-width: 85%;
            animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .message-row.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-row.ai {
            align-self: flex-start;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .user .avatar { background: var(--accent); }
        .ai .avatar { background: #334155; border: 1px solid var(--glass-border); }

        .bubble {
            padding: 16px 20px;
            border-radius: 20px;
            line-height: 1.6;
            font-size: 0.95rem;
            word-wrap: break-word;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .user .bubble {
            background: var(--user-msg);
            border-top-right-radius: 4px;
            color: white;
        }

        .ai .bubble {
            background: var(--ai-msg);
            border: 1px solid var(--glass-border);
            border-top-left-radius: 4px;
            backdrop-filter: blur(10px);
            color: #e2e8f0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-area {
            width: 100%;
            max-width: 1000px;
            padding: 24px;
            box-sizing: border-box;
            background: transparent;
        }

        .input-wrapper {
            display: flex;
            background: var(--chat-bg);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 8px 12px;
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            align-items: center;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 16px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            outline: none;
        }

        input[type="text"]::placeholder {
            color: #64748b;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        button:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .typing-indicator {
            display: none;
            align-items: center;
            gap: 6px;
            height: 24px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #94a3b8;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Markdown Styles inside bubble */
        .ai .bubble pre { 
            background: #020617; 
            padding: 16px; 
            border-radius: 8px; 
            overflow-x: auto; 
            border: 1px solid rgba(255,255,255,0.05);
            margin: 10px 0;
        }
        .ai .bubble code { 
            font-family: 'Courier New', Courier, monospace; 
            color: #93c5fd; 
            background: rgba(255,255,255,0.05);
            padding: 2px 4px;
            border-radius: 4px;
        }
        .ai .bubble pre code {
            background: transparent;
            padding: 0;
            color: #e2e8f0;
        }
        .ai .bubble p { margin-top: 0; margin-bottom: 10px; }
        .ai .bubble p:last-child { margin-bottom: 0; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <i data-lucide="sparkles" style="color: #60a5fa;"></i>
            <div class="logo">FastAPI x Ollama</div>
        </div>
        <div>
            <select id="model-select">
                <option value="">모델 로딩중...</option>
            </select>
        </div>
    </header>

    <div class="chat-container" id="chat-container">
        <!-- AI Welcome Message -->
        <div class="message-row ai">
            <div class="avatar"><i data-lucide="bot" color="white" size="20"></i></div>
            <div class="bubble">안녕하세요! 파이썬 백엔드(FastAPI)가 탑재된 즉시 사용 가능한 프리미엄 웹 버전입니다. 질문을 입력해주세요.</div>
        </div>
    </div>
    
    <div class="input-area">
        <form class="input-wrapper" id="chat-form">
            <input type="text" id="user-input" placeholder="메시지를 입력하세요..." autocomplete="off" required disabled>
            <button type="submit" id="send-btn" disabled>
                <i data-lucide="send" size="18"></i>
            </button>
        </form>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        const modelSelect = document.getElementById('model-select');
        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        let chatHistory = [];

        // Fetch available models from FastAPI
        async function loadModels() {
            try {
                const response = await fetch(`/api/models`);
                const data = await response.json();
                modelSelect.innerHTML = '';
                
                if (!data.models || data.models.length === 0) {
                    modelSelect.innerHTML = '<option value="">Ollama 모델이 없습니다.</option>';
                    return;
                }

                data.models.forEach(model => {
                    const option = document.createElement('option');
                    option.value = model.name;
                    option.textContent = model.name;
                    modelSelect.appendChild(option);
                });
                
                // Enable input once models are loaded
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.placeholder = "메시지를 입력하세요...";
            } catch (error) {
                modelSelect.innerHTML = '<option value="">백엔드 연결 실패</option>';
                console.error("Failed to load models:", error);
            }
        }

        function appendMessageRow(isUser) {
            const row = document.createElement('div');
            row.className = `message-row ${isUser ? 'user' : 'ai'}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerHTML = isUser ? '<i data-lucide="user" color="white" size="20"></i>' : '<i data-lucide="bot" color="white" size="20"></i>';
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            
            row.appendChild(avatar);
            row.appendChild(bubble);
            chatContainer.appendChild(row);
            lucide.createIcons({ root: row });
            
            return bubble;
        }

        function appendTypingIndicator() {
            const row = document.createElement('div');
            row.className = `message-row ai`;
            row.id = 'typing-row';
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerHTML = '<i data-lucide="bot" color="white" size="20"></i>';
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.style.padding = '12px 20px';
            bubble.innerHTML = `
                <div class="typing-indicator" style="display: flex;">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            `;
            
            row.appendChild(avatar);
            row.appendChild(bubble);
            chatContainer.appendChild(row);
            lucide.createIcons({ root: row });
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return row;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            const model = modelSelect.value;
            
            if (!text || !model) return;

            // User message
            const userBubble = appendMessageRow(true);
            userBubble.textContent = text;
            chatHistory.push({ role: 'user', content: text });
            
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;
            
            // Typing indicator
            const typingRow = appendTypingIndicator();

            try {
                const response = await fetch(`/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: model,
                        messages: chatHistory
                    })
                });

                if (!response.ok) throw new Error("Network error");

                // Remove typing indicator
                typingRow.remove();

                // Create AI message bubble
                const aiBubble = appendMessageRow(false);
                let aiFullResponse = '';

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n').filter(line => line.trim() !== '');
                    
                    for (const line of lines) {
                        try {
                            const parsed = JSON.parse(line);
                            if (parsed.message && parsed.message.content) {
                                aiFullResponse += parsed.message.content;
                                // Use marked.js for markdown rendering
                                aiBubble.innerHTML = marked.parse(aiFullResponse);
                                chatContainer.scrollTop = chatContainer.scrollHeight;
                            }
                        } catch(e) {}
                    }
                }
                chatHistory.push({ role: 'assistant', content: aiFullResponse });
            } catch (error) {
                typingRow.remove();
                const errorBubble = appendMessageRow(false);
                errorBubble.textContent = "오류가 발생했습니다. FastAPI 서버 연결을 확인해주세요.";
                errorBubble.style.color = "#ef4444";
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        });

        // Initialize
        loadModels();
    </script>
</body>
</html>
